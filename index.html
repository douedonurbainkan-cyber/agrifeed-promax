// Créer une icône PNG via Canvas
function createAppIcon(size) {
  var canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext("2d");
  // Fond vert foncé arrondi
  var r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r);
  ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0, "#0d2b0d");
  grad.addColorStop(1, "#2d6e2d");
  ctx.fillStyle = grad;
  ctx.fill();
  // Épi de blé
  ctx.font = (size*0.62)+"px serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🌾", size/2, size/2);
  return canvas.toDataURL("image/png");
}

// Générer les icônes et créer le manifest
window.addEventListener("DOMContentLoaded", function() {
  var icon192 = createAppIcon(192);
  var icon512 = createAppIcon(512);
  var manifest = {
    name: "AgriFeed Pro",
    short_name: "AgriFeed",
    description: "Gestion de moulin d'aliments pour animaux",
    start_url: "./",
    display: "standalone",

      {src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable"}
    ]
  };
  var blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  document.getElementById("pwa-manifest").href = url;
});
</script>

      snap.forEach(function(d){ docs.push(Object.assign({id:d.id},d.data())); });

// ─── COMPOSANT CHANGEMENT PIN ─────────────────────────────────
function PinChanger(props) {
  var employeePin = props.employeePin;
  var setEmployeePin = props.setEmployeePin;
  var gc = props.gc || "#2d6e2d";
  var [oldPin,  setOldPin]  = useState("");
  var [newPin,  setNewPin]  = useState("");
  var [newPin2, setNewPin2] = useState("");
  var [msg,     setMsg]     = useState("");
  var [ok,      setOk]      = useState(false);

  function sauvegarder() {
    if(!oldPin || !newPin || !newPin2){ setMsg("⚠️ Remplissez tous les champs"); setOk(false); return; }
    if(oldPin !== employeePin){ setMsg("⚠️ Ancien code incorrect"); setOk(false); return; }
    if(newPin.length < 4){ setMsg("⚠️ Le nouveau code doit avoir au moins 4 chiffres"); setOk(false); return; }
    if(newPin !== newPin2){ setMsg("⚠️ Les deux nouveaux codes ne correspondent pas"); setOk(false); return; }
    setEmployeePin(newPin);
    lsSet("employeePin", newPin);
    fbSave("config","employeePin",{pin:newPin});
    setMsg("✅ Code changé avec succès !");
    setOk(true);
    setOldPin(""); setNewPin(""); setNewPin2("");
    setTimeout(function(){ setMsg(""); }, 3000);
  }

  var inp2 = {width:"100%",border:"2px solid #e2e8e2",borderRadius:10,padding:"10px 12px",fontSize:18,letterSpacing:6,textAlign:"center",outline:"none",boxSizing:"border-box"};

  return (
    <div style={{display:"grid",gap:8}}>
      <div>
        <label style={{display:"block",fontSize:11,color:"#6b7280",fontWeight:700,marginBottom:4}}>ANCIEN CODE</label>
        <input type="password" maxLength={8} style={inp2} placeholder="••••" value={oldPin} onChange={function(e){setOldPin(e.target.value);setMsg("");}}/>
      </div>
      <div>
        <label style={{display:"block",fontSize:11,color:"#6b7280",fontWeight:700,marginBottom:4}}>NOUVEAU CODE</label>
        <input type="password" maxLength={8} style={inp2} placeholder="••••" value={newPin} onChange={function(e){setNewPin(e.target.value);setMsg("");}}/>
      </div>
      <div>
        <label style={{display:"block",fontSize:11,color:"#6b7280",fontWeight:700,marginBottom:4}}>CONFIRMER NOUVEAU CODE</label>
        <input type="password" maxLength={8} style={inp2} placeholder="••••" value={newPin2} onChange={function(e){setNewPin2(e.target.value);setMsg("");}}/>
      </div>
      <button onClick={sauvegarder} style={{background:"linear-gradient(135deg,#0d2b0d,"+gc+")",color:"#fff",border:"none",borderRadius:10,padding:"11px",fontWeight:700,fontSize:13,cursor:"pointer",marginTop:4}}>
        💾 Enregistrer le nouveau code
      </button>
      {msg && <div style={{background:ok?"#f0faf0":"#FEF2F2",borderRadius:8,padding:"8px 12px",fontSize:13,color:ok?"#059669":"#EF4444",fontWeight:600}}>{msg}</div>}
      <div style={{fontSize:11,color:"#9ca3af",textAlign:"center"}}>Code actuel : {"•".repeat(employeePin.length)} ({employeePin.length} caractères)</div>
    </div>
  );
}

      <PageWrap moulin={moulin} gc={gc} back={true} goHome={goHome}>
        <h2 style={{fontSize:20,marginBottom:4,color:"#1a2e1a",fontWeight:700}}>🔬 Formule personnalisée</h2>
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:16}}>Saisissez vos ingrédients — le devis se calcule automatiquement</p>

        {/* Infos client */}
        <div style={card}>
          <h3 style={{marginBottom:16,color:"#1a2e1a"}}>👤 Vos informations</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label style={lbl}>Nom *</label>
              <input style={inp} value={fForm.client} onChange={function(e){setFForm(Object.assign({},fForm,{client:e.target.value}));}}/>
            </div>
            <div>
              <label style={lbl}>Téléphone *</label>
              <input style={inp} value={fForm.tel} onChange={function(e){setFForm(Object.assign({},fForm,{tel:e.target.value}));}}/>
            </div>
          </div>
          <label style={lbl}>Type d'animal *</label>
          <input style={inp} placeholder="Ex: Poulet, Porc, Lapin..." value={fForm.animal} onChange={function(e){setFForm(Object.assign({},fForm,{animal:e.target.value}));}}/>
        </div>

        {/* Calculateur */}
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{color:"#1a2e1a"}}>🧪 Ingrédients & Calcul du Devis</h3>
            {totalDevis>0 && (
              <div style={{background:"#EDE9FE",borderRadius:10,padding:"6px 14px",fontSize:13,fontWeight:700,color:"#7C3AED"}}>
                Total : {Math.round(totalDevis).toLocaleString("fr-FR")} FCFA
              </div>
            )}
          </div>

          {/* En-têtes */}
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 28px",gap:6,marginBottom:8}}>
            {["Ingrédient","Quantité","Unité","Prix unitaire","= Total",""].map(function(h,i){
              return <div key={i} style={{fontSize:10,color:"#6b7280",fontWeight:700,textTransform:"uppercase"}}>{h}</div>;
            })}
          </div>

          {/* Lignes ingrédients */}
          {fForm.ings.map(function(ing, i) {
            var q = parseFloat(ing.qte)||0;
            var p = parseFloat(ing.pu)||0;
            var tl = q*p;
            return (
              <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 28px",gap:6,marginBottom:7,alignItems:"center"}}>
                <select style={Object.assign({},inp,{padding:"8px 10px",fontSize:13,background:"#fff"})} value={ing.nom} onChange={function(e){
                    var nom=e.target.value;
                    var a=fForm.ings.slice(); a[i]=Object.assign({},a[i],{nom:nom,pu:a[i].pu||(prixIngs[nom]||"")});
                    setFForm(Object.assign({},fForm,{ings:a}));
                  }}>
                  <option value="">— Choisir —</option>
                  {ING_LIST.map(function(n){ return <option key={n} value={n}>{n}</option>; })}
                </select>
                <input type="number" min="0" step="any" style={Object.assign({},inp,{padding:"8px 10px",fontSize:13,textAlign:"right"})} placeholder="0" value={ing.qte} onChange={function(e){updIng(i,"qte",e.target.value);}}/>
                <select style={Object.assign({},inp,{padding:"8px 10px",fontSize:13,background:"#fff"})} value={ing.u} onChange={function(e){updIng(i,"u",e.target.value);}}>
                  {UNITES.map(function(u){ return <option key={u} value={u}>{u}</option>; })}
                </select>
                {prixIngs[ing.nom] ? (
                  <div style={{background:"#F5F3FF",border:"2px solid #7C3AED",borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:700,color:"#7C3AED",textAlign:"right",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>🔒</span>
                    <span>{parseInt(prixIngs[ing.nom]).toLocaleString("fr-FR")} FCFA</span>
                  </div>
                ) : (
                  <input type="number" min="0" step="any" style={Object.assign({},inp,{padding:"8px 10px",fontSize:13,textAlign:"right",borderColor:ing.pu?"#7C3AED":"#e2e8e2"})} placeholder="0 FCFA" value={ing.pu} onChange={function(e){updIng(i,"pu",e.target.value);}}/>
                )}
                <div style={{background:tl>0?"#EDE9FE":"#f9fafb",borderRadius:9,padding:"8px 6px",fontSize:12,fontWeight:700,color:tl>0?"#7C3AED":"#9ca3af",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",minHeight:38}}>
                  {tl>0 ? Math.round(tl).toLocaleString("fr-FR") : "—"}
                </div>
                {fForm.ings.length>1
                  ? <button onClick={function(){delIng(i);}} style={{background:"#FEE2E2",color:"#EF4444",border:"none",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14,padding:0}}>✕</button>
                  : <div/>
                }
              </div>
            );
          })}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,paddingTop:10,borderTop:"1px solid #f3f4f6"}}>
            <button onClick={addIng} style={Object.assign({},mkBtnO("#7C3AED"),{fontSize:12,padding:"7px 14px"})}>+ Ajouter un ingrédient</button>
            {totalDevis>0 && (
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>TOTAL DEVIS ESTIMÉ</div>
                <div style={{fontSize:22,fontWeight:700,color:"#7C3AED"}}>{Math.round(totalDevis).toLocaleString("fr-FR")} FCFA</div>
              </div>
            )}
          </div>
        </div>

        {/* Récapitulatif tableau */}
        {ingsFilled.length>0 && (
          <div style={Object.assign({},card,{background:"#F5F3FF",border:"2px solid #7C3AED"})}>
            <h4 style={{color:"#5B21B6",marginBottom:12,fontSize:14}}>📋 Récapitulatif de votre devis</h4>
            <table>
              <thead>
                <tr style={{background:"#EDE9FE"}}>
                  {["Ingrédient","Qté","Unité","Prix unitaire","Total"].map(function(h,i){
                    return <th key={h} style={{padding:"7px 10px",textAlign:i===0?"left":"right",fontWeight:700,color:"#5B21B6",fontSize:11}}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {ingsFilled.map(function(ing,i){
                  var q=parseFloat(ing.qte), p=parseFloat(ing.pu), t=q*p;
                  return (
                    <tr key={i} style={{borderBottom:"1px solid #DDD6FE",background:i%2===0?"#fff":"#faf5ff"}}>
                      <td style={{padding:"7px 10px",fontWeight:700}}>{ing.nom}</td>
                      <td style={{padding:"7px 10px",textAlign:"right"}}>{q}</td>
                      <td style={{padding:"7px 10px",textAlign:"right",color:"#6b7280"}}>{ing.u}</td>
                      <td style={{padding:"7px 10px",textAlign:"right"}}>{p.toLocaleString("fr-FR")} FCFA</td>
                      <td style={{padding:"7px 10px",textAlign:"right",fontWeight:700,color:"#7C3AED"}}>{Math.round(t).toLocaleString("fr-FR")} FCFA</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:"#7C3AED"}}>
                  <td colSpan={4} style={{padding:"9px 10px",color:"#fff",fontWeight:700,fontSize:13}}>TOTAL ESTIMÉ</td>
                  <td style={{padding:"9px 10px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:15}}>{Math.round(totalDevis).toLocaleString("fr-FR")} FCFA</td>
                </tr>
              </tfoot>
            </table>
            <div style={{marginTop:10,fontSize:11,color:"#7C3AED",opacity:0.8}}>⚠️ Estimation — le moulin confirmera le montant final.</div>
          </div>
        )}

        {/* Document & message */}
        <div style={card}>
          <h3 style={{marginBottom:14,color:"#1a2e1a"}}>📎 Document & Message</h3>
          <div style={{marginBottom:14}}>
            <label style={lbl}>Joindre un fichier (optionnel)</label>
            <label style={{display:"flex",alignItems:"center",gap:10,border:"2px dashed #d1d5db",borderRadius:9,padding:"14px 16px",cursor:"pointer",background:fForm.fichier?"#f0faf0":"#fafafa"}}>
              <span style={{fontSize:22}}>{fForm.fichier?"📄":"📁"}</span>
              <div>
                <div style={{fontWeight:700,fontSize:12,color:fForm.fichier?"#059669":"#374151"}}>{fForm.fichier||"Cliquez pour sélectionner"}</div>
                <div style={{fontSize:10,color:"#9ca3af"}}>PDF, Word, Excel, Image</div>
              </div>
              <input type="file" style={{display:"none"}} onChange={function(e){setFForm(Object.assign({},fForm,{fichier:e.target.files[0]?e.target.files[0].name:""}));}}/>
            </label>
          </div>
          <label style={lbl}>Message (optionnel)</label>
          <textarea style={Object.assign({},inp,{minHeight:76,resize:"vertical"})} placeholder="Précisez vos attentes, délais souhaités..." value={fForm.desc} onChange={function(e){setFForm(Object.assign({},fForm,{desc:e.target.value}));}}/>
        </div>

        <button style={Object.assign({},mkBtn("#7C3AED"),{width:"100%",padding:13,fontSize:14,opacity:canSubmit?1:0.45})} disabled={!canSubmit} onClick={submitFC}>
          🚀 Envoyer ma formule + devis au moulin
        </button>
      </PageWrap>
    );
  }

  // ══ ADMIN LOGIN ══
  if(view==="admin" && !adminOk) {
    return (
      <PageWrap moulin={moulin} gc={gc} back={true} goHome={goHome}>
        <div style={{maxWidth:360,margin:"40px auto"}}>
          <div style={Object.assign({},card,{textAlign:"center"})}>
            <div style={{fontSize:44,marginBottom:10}}>🔐</div>
            <h2 style={{color:"#1a2e1a",marginBottom:4}}>Espace Employé</h2>
            <p style={{color:"#9ca3af",fontSize:12,marginBottom:18}}>Entrez le code d'accès</p>
            <input type="password" maxLength={6} style={Object.assign({},inp,{textAlign:"center",fontSize:22,letterSpacing:8,marginBottom:10})}
              placeholder="••••" value={aCode}
              onChange={function(e){setACode(e.target.value);setAErr(false);}}
              onKeyDown={function(e){if(e.key==="Enter"){if(aCode===employeePin){setAdminOk(true);setACode("");}else{setAErr(true);}}}}/>
            {aErr && <div style={{color:"#EF4444",fontSize:12,marginBottom:8}}>Code incorrect.</div>}
            <button style={Object.assign({},mkBtn(),{width:"100%"})} onClick={function(){if(aCode===employeePin){setAdminOk(true);setACode("");}else{setAErr(true);}}}>Accéder</button>
            <p style={{fontSize:10,color:"#d1d5db",marginTop:12}}>Code par défaut : 1234</p>
          </div>
        </div>
      </PageWrap>
    );
  }

  // ══ ADMIN PANEL ══
  var stats = {
    att:  orders.filter(function(o){return o.status==="en_attente";}).length,
    prod: orders.filter(function(o){return o.status==="en_production";}).length,
    pret: orders.filter(function(o){return o.status==="pret";}).length,
  };

  return (
    <PageWrap moulin={moulin} gc={gc} back={false} goHome={goHome} wide={true}>

      {/* Firebase status */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,background:fbOk?"#D1FAE5":"#FEF3C7",border:"1px solid "+(fbOk?"#059669":"#F59E0B"),borderRadius:14,padding:"9px 18px",fontSize:12,color:fbOk?"#065F46":"#92400E",fontWeight:700}}>
        <span style={{fontSize:16}}>{fbOk?"🔥":"⏳"}</span>
        <span>{fbOk?"Firebase connecté — toutes les données sont synchronisées en temps réel ✅":"Connexion Firebase en cours... (activez Firestore si ce message persiste)"}</span>
      </div>

      {/* Stats */}
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {[{l:"En attente",v:stats.att,c:"#D97706",i:"⏳"},{l:"En production",v:stats.prod,c:"#2563EB",i:"⚙️"},{l:"Prêt",v:stats.pret,c:"#059669",i:"✅"},{l:"Formules",v:nbFC,c:"#7C3AED",i:"🔬"}].map(function(s){
          return (
            <div key={s.l} style={{flex:1,minWidth:110,background:"#fff",borderRadius:20,padding:"18px 20px",boxShadow:"0 6px 22px rgba(45,110,45,0.15)",borderLeft:"6px solid "+s.c}}>
              <div style={{fontSize:22}}>{s.i}</div>
              <div style={{fontSize:26,fontWeight:700,color:s.c,lineHeight:1.1}}>{s.v}</div>
              <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{s.l}</div>
            </div>
          );
        })}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:5,marginBottom:22,background:"#fff",borderRadius:20,padding:7,boxShadow:"0 4px 18px rgba(45,110,45,0.14)",flexWrap:"wrap"}}>
        {[{id:"commandes",l:"📋 Commandes"},{id:"fc",l:"🔬 Formules"+(nbFC>0?" ("+nbFC+")":"")},{id:"matieres",l:"💰 Prix matières"},{id:"prixvente",l:"🏷️ Prix de vente"},{id:"prixings",l:"🧪 Prix ingrédients"},{id:"formules",l:"📊 Formules std"},{id:"excel",l:"📥 Excel"},{id:"qr",l:"📱 QR Code"},{id:"config",l:"⚙️ Moulin"}].map(function(t){
          return <button key={t.id} onClick={function(){setTab(t.id);}} style={{background:tab===t.id?gc:"transparent",color:tab===t.id?"#fff":"#6b7280",border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>{t.l}</button>;
        })}
      </div>

      {/* ── Commandes ── */}
      {tab==="commandes" && (
        <div>
          {orders.length===0 && <div style={Object.assign({},card,{textAlign:"center",color:"#9ca3af",padding:36})}>Aucune commande</div>}
          {orders.map(function(o){
            var f = FMLS.find(function(f){return f.id===o.fId;});
            var st = ST[o.status];
            return (
              <div key={o.id} style={Object.assign({},card,{borderLeft:"4px solid "+st.color})}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:15}}>{o.client}</span>
                      <span style={{background:st.bg,color:st.color,padding:"3px 11px",borderRadius:20,fontSize:11,fontWeight:700}}>{st.icon} {st.label}</span>
                      <span style={{fontSize:10,color:"#9ca3af"}}>{o.id} · {o.date}</span>
                    </div>
                    <div style={{fontSize:13,marginBottom:2}}>{f?f.e:""} <strong>{f?f.nom:""}</strong> — <strong>{o.sacs} sacs</strong> × {fmt(o.prix)}</div>
                    {o.note && <div style={{fontSize:11,color:"#6b7280"}}>📝 {o.note}</div>}
                    <div style={{fontSize:11,color:"#6b7280"}}>📞 {o.tel}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:700,color:gc,marginBottom:8}}>{fmt(o.sacs*o.prix)}</div>
                    <div style={{display:"flex",gap:7}}>
                      {NEXT[o.status] && (
                        <button onClick={function(){fbUpdate("orders",o.id,{status:NEXT[o.status]});setOrders(function(p){return p.map(function(x){return x.id===o.id?Object.assign({},x,{status:NEXT[o.status]}):x;});});}} style={{background:ST[NEXT[o.status]].bg,color:ST[NEXT[o.status]].color,border:"1px solid "+ST[NEXT[o.status]].color,borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>
                          {ST[NEXT[o.status]].icon} {ST[NEXT[o.status]].label}
                        </button>
                      )}
                      {o.status!=="livre" && o.status!=="annulee" && (
                        <button onClick={function(){fbUpdate("orders",o.id,{status:"annulee"});setOrders(function(p){return p.map(function(x){return x.id===o.id?Object.assign({},x,{status:"annulee"}):x;});});}} style={{background:"#FEE2E2",color:"#EF4444",border:"1px solid #EF4444",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:11}}>✕</button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Formules clients ── */}
      {tab==="fc" && (
        <div>
          {fClients.length===0 && <div style={Object.assign({},card,{textAlign:"center",color:"#9ca3af",padding:40})}><div style={{fontSize:36,marginBottom:8}}>🔬</div>Aucune formule reçue.</div>}
          {fClients.map(function(fc){
            var st = ST_FC[fc.status] || ST_FC.en_attente;
            var hasNext = fc.status==="en_attente" || fc.status==="en_cours";
            var nextLbl = fc.status==="en_attente" ? "▶ Démarrer production" : "✅ Marquer Terminé";
            var nextC   = fc.status==="en_attente" ? "#2563EB" : "#059669";
            return (
              <div key={fc.id} style={Object.assign({},card,{borderLeft:"4px solid "+st.color})}>
                {/* En-tête */}
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:12}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:15}}>{fc.client}</span>
                      <span style={{background:st.bg,color:st.color,padding:"3px 11px",borderRadius:18,fontSize:11,fontWeight:700}}>{st.icon} {st.label}</span>
                      <span style={{fontSize:10,color:"#9ca3af"}}>{fc.id} · {fc.date}</span>
                    </div>
                    <div style={{fontSize:13}}>🐾 <strong>{fc.animal}</strong> · 📞 {fc.tel}</div>
                  </div>
                  {hasNext && (
                    <button onClick={function(){advanceFC(fc.id,fc.status);}} style={{background:nextC,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700,boxShadow:"0 3px 8px "+nextC+"44"}}>
                      {nextLbl}
                    </button>
                  )}
                </div>

                {/* Tableau devis */}
                {fc.ings && fc.ings.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.4,marginBottom:6}}>📋 Devis du client</div>
                    <table>
                      <thead>
                        <tr style={{background:"#F5F3FF"}}>
                          {["Ingrédient","Quantité","Unité","Prix unitaire","Total"].map(function(h,i){
                            return <th key={h} style={{padding:"6px 8px",textAlign:i===0?"left":"right",color:"#7C3AED",fontWeight:700,fontSize:11}}>{h}</th>;
                          })}
                        </tr>
                      </thead>
                      <tbody>
                        {fc.ings.map(function(ig,i){
                          var q=parseFloat(ig.qte)||0, p=parseFloat(ig.pu)||0, t=q*p;
                          return (
                            <tr key={i} style={{borderBottom:"1px solid #EDE9FE",background:i%2===0?"#fff":"#faf5ff"}}>
                              <td style={{padding:"6px 8px",fontWeight:700}}>{ig.nom}</td>
                              <td style={{padding:"6px 8px",textAlign:"right"}}>{ig.qte}</td>
                              <td style={{padding:"6px 8px",textAlign:"right",color:"#9ca3af"}}>{ig.u}</td>
                              <td style={{padding:"6px 8px",textAlign:"right"}}>{p>0?p.toLocaleString("fr-FR")+" FCFA":"—"}</td>
                              <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,color:t>0?"#7C3AED":"#9ca3af"}}>{t>0?Math.round(t).toLocaleString("fr-FR")+" FCFA":"—"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                      {fc.total>0 && (
                        <tfoot>
                          <tr style={{background:"#7C3AED"}}>
                            <td colSpan={4} style={{padding:"7px 8px",color:"#fff",fontWeight:700}}>TOTAL ESTIMÉ</td>
                            <td style={{padding:"7px 8px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:14}}>{Math.round(fc.total).toLocaleString("fr-FR")} FCFA</td>
                          </tr>
                        </tfoot>
                      )}
                    </table>
                  </div>
                )}

                {fc.desc && <div style={{background:"#F5F3FF",borderRadius:8,padding:"8px 12px",fontSize:12,marginBottom:6}}>💬 {fc.desc}</div>}
                {fc.fichier && <div style={{background:"#f0faf0",borderRadius:8,padding:"6px 12px",fontSize:11,color:"#059669",marginBottom:6}}>📎 {fc.fichier}</div>}

                {/* Message production terminée */}
                {fc.status==="termine" && fc.notif && (
                  <div style={{background:"#D1FAE5",border:"1px solid #059669",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#065F46",marginTop:6}}>
                    <div style={{fontWeight:700,marginBottom:4}}>📱 Message à envoyer au client ({fc.tel})</div>
                    <div style={{fontStyle:"italic",marginBottom:8,lineHeight:1.6}}>"{fc.notif}"</div>
                    <button onClick={function(){if(navigator.clipboard){navigator.clipboard.writeText(fc.notif);}}} style={{background:"#059669",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:11,fontWeight:700}}>
                      📋 Copier le message
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── Prix matières ── */}
      {tab==="matieres" && (
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{color:"#1a2e1a"}}>💰 Prix des Matières Premières</h3>
            <span style={{fontSize:10,color:"#9ca3af"}}>{today()}</span>
          </div>
          {mats.map(function(m){
            return (
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f3f4f6"}}>
                <div style={{flex:1,fontWeight:700,fontSize:13}}>{m.nom}</div>
                <div style={{fontSize:11,color:"#9ca3af",width:40}}>/{m.u}</div>
                {editP[m.id]!==undefined ? (
                  <div style={{display:"flex",gap:7,alignItems:"center"}}>
                    <input type="number" min="0" style={Object.assign({},inp,{width:100,padding:"5px 8px"})} value={editP[m.id]} autoFocus onChange={function(e){setEditP(function(p){return Object.assign({},p,{[m.id]:e.target.value});});}} onKeyDown={function(e){if(e.key==="Enter"){saveP(m.id);}}}/>
                    <button style={Object.assign({},mkBtn(),{padding:"5px 12px",fontSize:11})} onClick={function(){saveP(m.id);}}>✓</button>

            <p style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Changez le code pour que vos clients ne puissent pas entrer ici.</p>
            <PinChanger employeePin={employeePin} setEmployeePin={setEmployeePin} gc={gc}/>
          </div>

          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick={function(){setAdminOk(false);goHome();}} style={{background:"#fff",color:"#ef4444",border:"2px solid #ef4444",borderRadius:10,padding:"10px 18px",cursor:"pointer",fontWeight:700,fontSize:13}}>
              🚪 Déconnexion employé
            </button>
            <button onClick={function(){lsSet("lic_code","");lsSet("lic_data",null);setLicOk(false);}} style={{background:"#fff",color:"#9ca3af",border:"2px solid #e5e7eb",borderRadius:10,padding:"10px 18px",cursor:"pointer",fontWeight:700,fontSize:13}}>
              🔑 Changer de licence
            </button>
          </div>
        </div>
      )}

      <div style={{height:24}}/>
    </PageWrap>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// ── Service Worker (PWA hors ligne) ──────────────────────────
if("serviceWorker" in navigator) {
  var SW_CODE = `
const CACHE = "agrifeed-v2";
const FILES = ["/"];

self.addEventListener("install", function(e) {
  e.waitUntil(
    caches.open(CACHE).then(function(cache) {
      return cache.addAll(FILES);
    })
  );
  self.skipWaiting();
});

self.addEventListener("activate", function(e) {
  e.waitUntil(
    caches.keys().then(function(keys) {
      return Promise.all(keys.filter(function(k){ return k!==CACHE; }).map(function(k){ return caches.delete(k); }));
    })
  );
  self.clients.claim();
});

self.addEventListener("fetch", function(e) {
  // Ne pas intercepter Firebase et CDN
  var url = e.request.url;
  if(url.includes("firebase") || url.includes("googleapis") || url.includes("gstatic") || url.includes("cdnjs")) {
    return;
  }
  e.respondWith(
    fetch(e.request).then(function(response) {
      var clone = response.clone();
      caches.open(CACHE).then(function(cache){ cache.put(e.request, clone); });
      return response;
    }).catch(function() {
      return caches.match(e.request).then(function(cached){
        return cached || caches.match("/");
      });
    })
  );
});
`;
  var blob = new Blob([SW_CODE], {type:"application/javascript"});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:"/"}).then(function(reg){
    console.log("✅ Service Worker enregistré");
  }).catch(function(err){
    console.warn("SW non supporté ici:", err.message);
  });
}

// ── Prompt installation PWA ───────────────────────────────────
var deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Afficher bouton installer après 3 secondes
  setTimeout(function() {
    var btn = document.getElementById("pwa-install-btn");
    if(btn) btn.style.display = "flex";
  }, 3000);
});

window.addEventListener("appinstalled", function() {
  var btn = document.getElementById("pwa-install-btn");
  if(btn) btn.style.display = "none";
  deferredPrompt = null;
});

function installPWA() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
  }
}
</script>

</div>
